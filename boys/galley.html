*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Rajdhani',sans-serif;background:var(--black);color:var(--white);min-height:100vh;padding-bottom:40px;}
.gy-banner{width:100%;max-height:170px;overflow:hidden;}
.gy-banner img{width:100%;height:100%;object-fit:cover;object-position:center 45%;display:block;}

header{padding:20px 16px 10px;text-align:center;}
.back{display:inline-block;color:var(--teal3);text-decoration:none;font-size:12px;letter-spacing:1px;margin-bottom:10px;}
h1{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;letter-spacing:1px;color:var(--gold);}
.sub{font-size:13px;color:var(--offwhite);opacity:.8;margin-top:4px;}
main{max-width:640px;margin:0 auto;padding:0 14px;}
.search-inp{width:100%;padding:12px;border-radius:8px;background:var(--dark2);border:1px solid var(--teal);color:var(--white);font-size:15px;font-family:inherit;margin-bottom:10px;}
.search-inp:focus{outline:none;border-color:var(--teal3);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.fc{padding:7px 12px;border-radius:20px;background:var(--dark2);border:1px solid var(--teal);color:var(--offwhite);font-size:12px;cursor:pointer;font-family:inherit;}
.fc.active{background:var(--teal);color:var(--black);font-weight:700;}
.meal-card{background:var(--dark2);border:1px solid rgba(18,196,196,.25);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.meal-hd{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;}
.meal-name{font-weight:700;font-size:15px;color:var(--white);}
.meal-meta{font-size:11.5px;color:var(--teal3);margin-top:3px;}
.meal-chev{font-size:11px;color:var(--teal3);flex-shrink:0;}
.meal-bd{display:none;padding:0 14px 14px;border-top:1px solid rgba(18,196,196,.2);}
.meal-bd.open{display:block;}
.meal-bd .sec-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;color:var(--gold);text-transform:uppercase;margin:12px 0 6px;}
.meal-bd ul{padding-left:18px;font-size:14px;line-height:1.6;color:var(--offwhite);}
.meal-bd .steps{font-size:14px;line-height:1.7;color:var(--offwhite);}
.step{display:flex;gap:10px;margin-bottom:8px;}
.step-num{background:var(--teal);color:var(--black);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.no-recipe{font-size:13px;font-style:italic;color:var(--offwhite);opacity:.7;padding:12px 0;}
.meta-row{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--teal3);margin:10px 0;}
.empty{text-align:center;padding:40px 20px;color:var(--offwhite);opacity:.6;font-style:italic;}
</style>

"MCD Steak Egg & Cheese Bagels":{tier:"adapted",prov:"A copycat recipe John found online and makes because Dawn loves them. Source long forgotten.",y:"4 servings",t:"Broiler/Stovetop",p:"20 min",c:"20 min",s:[{h:"Sauce",i:["2 Tbsp mayonnaise","2 tsp creamy dill mustard"]},{h:"Sauteed Onions",i:["1 small onion","3 Tbsp butter","Dash of pepper"]},{h:"Sandwich",i:["1 lb thin cut steak","1/2 Tbsp Worcestershire sauce","McCormick Montreal Steak Seasoning","4 eggs","4 bagels","American cheese"]}],d:["Combine sauce ingredients and set aside.","Slice onions into thin slivers. Melt butter in skillet, add onions and pepper. Saute on medium heat until tender. Set aside.","Season steak with steak seasoning and tenderize with mallet. Fry steak with 4 Tbsp water. Cut in 4 pieces.","Broil buttered bagels until toasted.","Cook eggs one at a time. Whisk egg until well mixed. Add 1/2 Tbsp butter to skillet. Cook egg on low, flip, fold edges inward to form a square omelet.","Assembly: sauce on bottom bagel, cheese, steak, sauteed onions, egg, more sauce on top."]},
"John's Snickerdoodles":{tier:"johns",prov:"John's own recipe.",y:"~48 cookies",t:"350F",p:"30 min",c:"10 min",s:[{h:"Cookie Dough",i:["1 Cup butter","1.5 Cups sugar","2 eggs","2.75 Cups flour","2 tsp cream of tartar","1 tsp baking soda","1/4 tsp salt"]},{h:"Coating",i:["3 Tbsp sugar","1 tsp cinnamon"]}],d:["Preheat oven to 350F.","Cream butter and 1.5 cups sugar until light and fluffy. Beat in eggs.","Combine flour, cream of tartar, baking soda, and salt in a separate bowl.","Gradually blend dry ingredients into butter mixture.","Refrigerate dough for 30 minutes.","Mix 3 Tbsp sugar and 1 tsp cinnamon for coating.","Roll chilled dough into 1-inch balls, then roll each ball in cinnamon sugar.","Place 2 inches apart on ungreased cookie sheets.","Bake 10 minutes until edges are lightly golden. Centers will firm up as they cool.","Cool 2 minutes on sheet before transferring to a wire rack."]},
"Chocolate Cookies":{y:"~40 cookies",t:"350F",p:"2+ hrs",c:"8-10 min",s:[{h:"Ingredients",i:["1/2 Cup vegetable oil","1 Cup cocoa powder","2 Cups sugar","4 eggs","2 tsp vanilla extract","2 Cups all-purpose flour (add 1/4 cup more if needed)","2 tsp baking powder","1 tsp salt","Powdered sugar for rolling"]}],d:["Combine oil, cocoa powder, and sugar. Mix thoroughly.","Beat in eggs one at a time then add vanilla.","Whisk together flour, baking powder, and salt in a separate bowl.","Gradually mix dry ingredients into chocolate mixture. Add up to 1/4 cup more flour if very sticky.","Refrigerate at least 2 hours or overnight.","Preheat oven to 350F. Line baking sheets with parchment.","Roll tablespoon-sized portions into balls, then roll in powdered sugar.","Bake 8-10 minutes. Cookies will puff and crack. Do not overbake.","Cool on baking sheet 5 minutes then transfer to a wire rack."]},
"Chocolate Chip Cookies":{y:"~48 cookies",t:"325F",p:"15 min",c:"10-12 min",s:[{h:"Ingredients",i:["2.25 Cups all-purpose flour","1 tsp baking soda","1/2 tsp salt","1 Cup butter softened","3/4 Cup packed brown sugar","3/4 Cup white sugar","1 tsp vanilla extract","2 large eggs","2 Cups semisweet chocolate chips"]}],d:["Preheat oven to 325F. Grease or line cookie sheets.","Sift together flour, baking soda, and salt. Set aside.","Cream together softened butter and both sugars until light and fluffy (2-3 minutes).","Beat in vanilla and eggs until light and creamy.","Gradually mix in flour mixture until just combined. Do not overmix.","Fold in chocolate chips.","Drop rounded tablespoons onto cookie sheets about 3 inches apart.","Bake 10-12 minutes until edges are golden but centers still look slightly soft.","Cool on baking sheet 5 minutes then transfer to wire racks."]},
"No Bake Cookies":{y:"~36 cookies",t:"Stovetop",p:"10 min + chill",c:"2 min",s:[{h:"Ingredients",i:["2 Cups sugar","1/4 Cup powdered cocoa","1/2 Cup milk","1/2 Cup butter","1 tsp vanilla","Pinch salt","1/2 Cup peanut butter","3 Cups quick oats"]}],d:["In saucepan combine cocoa, sugar, milk, and butter over medium heat. Bring to a boil.","Boil exactly one minute.","Remove from heat and stir in salt, vanilla, oats and peanut butter.","Drop onto cookie sheet.","Refrigerate for one hour."]},
"Grandma's Rice Pudding":{tier:"grandma",prov:"Handed down from Grandma Stewart -- reconstructed from memory and taste by John, and confirmed by his father.",y:"8 servings",t:"350F",p:"20 min",c:"45-60 min",s:[{h:"Ingredients",i:["2 Cups milk (for cooking rice)","1/2 Cup uncooked white rice","1 egg beaten","3 Cups milk","1 tsp vanilla extract","1/2 Cup sugar","Ground nutmeg for sprinkling"]}],d:["Bring 2 cups milk to a gentle simmer. Add rice and cook on low, stirring occasionally, until tender and milk is mostly absorbed (about 20 minutes).","Preheat oven to 350F. Butter a deep 2-quart baking dish.","Whisk together beaten egg, 3 cups milk, vanilla, and sugar until combined.","Add cooked rice to egg mixture and stir to combine.","Pour into prepared baking dish. Sprinkle top generously with ground nutmeg.","Bake 45 minutes to 1 hour.","Refrigerate until chilled."]},
"Grandma's Pie Crust":{tier:"grandma",prov:"Grandma Stewart's pie crust -- handed down and reconstructed from memory by John.",y:"2 crusts",t:"N/A",p:"10 min",c:"N/A",s:[{h:"Ingredients",i:["2 Cups all-purpose flour","1.5 tsp salt","1/2 Cup vegetable oil","1/4 Cup cold milk"]}],d:["Combine flour and salt in a large bowl.","Add oil and mix with a fork until crumbly.","Sprinkle milk over mixture one tablespoon at a time, mixing gently after each addition.","Mix until dough just holds together. Add a little more oil if too dry.","Divide dough in half. Press each half into a disk.","Roll out on a floured surface or between two sheets of wax paper to fit your pie pan.","Very tender and easy to work with."]},
"Apple Crumble":{y:"8 servings",t:"350F",p:"15 min",c:"45 min",s:[{h:"Crumb Topping",i:["1 Cup brown sugar","1 Cup quick oats","1/2 Cup all-purpose flour","1/4 Cup butter softened"]},{h:"Apple Filling",i:["3 Cups apples peeled and sliced","3/4 Cup water","1/2 Cup white sugar","1 tsp ground cinnamon"]}],d:["Preheat oven to 350F. Grease a 2-quart baking dish.","Mix together brown sugar, oats, flour, and softened butter until it resembles coarse crumbs.","Place half of the crumb mixture in bottom of baking dish. Add sliced apples on top.","Stir together water, white sugar, and cinnamon until sugar dissolves. Pour evenly over apples.","Sprinkle remaining crumb mixture evenly over the top.","Bake 45 minutes until apples are tender and topping is golden brown.","Serve warm. Delicious with vanilla ice cream or whipped cream."]},
"Apple Cobbler":{y:"8-10 servings",t:"350F",p:"15 min + chill",c:"45-60 min",s:[{h:"Apple Filling",i:["6 large apples peeled cored and sliced","3 Tbsp ground cinnamon","2 Tbsp fresh lime or lemon juice","2 Tbsp sugar","1/4 Cup apple cider"]},{h:"Oatmeal Topping",i:["2 Cups instant oatmeal","1/4 Cup butter melted","1/4 Cup brown sugar","2 Tbsp ground cinnamon"]}],d:["Combine sliced apples, cinnamon, lime juice, and sugar. Toss to coat. Refrigerate at least 1 hour.","Preheat oven to 350F. Grease a 9x13-inch baking dish.","Remove apples from refrigerator and toss with apple cider. Pour into baking dish.","Combine oatmeal, melted butter, brown sugar, and cinnamon. Mix until oats are moistened.","Sprinkle oatmeal topping evenly over apples.","Bake 45-60 minutes until apples are tender and bubbly and topping is golden brown.","Let cool 10 minutes. Serve warm with vanilla ice cream."]},
"Mom's Cheesecake":{tier:"mom",prov:"Mom's cheesecake -- a recipe she made for the family for years.",y:"10-12 servings",t:"375F",p:"20 min",c:"1 hour",n:"Special occasion -- make ahead",s:[{h:"Crust",i:["1.25 cups graham cracker crumbs","2 Tbsp butter melted"]},{h:"Filling",i:["16 oz cream cheese","1 Cup sugar","3 eggs","1 tsp vanilla","16 oz sour cream","2 tsp sugar"]}],d:["Have all ingredients at room temperature. Grease a 9-inch spring form pan with butter.","Put graham cracker crumbs in pan, add melted butter. Pack firmly into bottom of pan.","Beat cream cheese with electric mixer until fluffy.","Gradually add sugar then eggs and beat well.","Add vanilla then sour cream.","Pour batter into prepared spring form pan.","Bake at 375F for one hour. Turn off oven and leave cake in oven for one hour."]},
"Surprise Muffins":{y:"12 muffins",t:"400F",p:"15 min",c:"20-25 min",s:[{h:"Muffin Batter",i:["1 egg","1/2 Cup milk","1/4 Cup oil","1.5 Cups flour","1/2 Cup sugar","2 tsp baking powder","1/2 tsp salt"]},{h:"Optional Cinnamon Topping",i:["3/4 Cup chopped nuts","3/4 Cup brown sugar","1.5 tsp cinnamon"]}],d:["Grease and flour cupcake tin. Preheat oven to 400F.","Beat egg. Stir in milk and oil.","Mix in remaining ingredients. Batter may be lumpy.","Fill muffin tins 1/2 full and add a spoonful of jam or jelly to center of batter.","Top off with remaining batter. Bake 20 to 25 minutes.","Sprinkle with cinnamon topping if desired."]},
"Danish Pastry":{y:"12-16 pastries",t:"375F",p:"Overnight",c:"5-15 min",n:"Christmas special -- overnight prep required",s:[{h:"Dough",i:["1/2 Cup plus 2 Tbsp milk","2 tsp white sugar","1/2 tsp salt","1 packet instant yeast","2 Cups flour","1 egg","1/4 tsp almond extract"]},{h:"Butter Sheet",i:["1/2 Cup butter softened 20 min","2 Tbsp flour"]},{h:"Egg Wash and Icing",i:["1 egg white mixed with 1 Tbsp water","4 Tbsp powdered sugar plus water to thin"]}],d:["Pound softened butter into a 1/4-inch thick square between plastic wrap. Refrigerate.","Mix 1.5 cups flour, sugar, yeast, and salt. Warm milk until just warm, add to flour. Beat egg with almond extract, add to dough. Add remaining flour until dough is just past sticky. Knead briefly. Let rise 20-30 min.","Roll dough into 16x16-inch square. Place butter sheet in center, fold dough over to enclose. Seal seams.","Roll into 20x12-inch rectangle. Fold into thirds. Roll again, fold again. Wrap in plastic, refrigerate 20-30 min. Repeat two more times. Refrigerate overnight.","Remove dough, let warm 5 min. Roll to 1/4-inch thickness. Cut into 1/2-inch strips. Shape each into a spiral.","Place on parchment-lined sheets. Cover, let rise until doubled.","Preheat oven to 375F. Make indentation in center of each Danish. Fill with jam, cream cheese, or fruit. Brush with egg wash.","Bake 5-15 minutes until golden. Drizzle with powdered sugar icing when cool."]},
"Homemade Meatloaf":{y:"6 servings",t:"350F",p:"15 min",c:"45-60 min",s:[{h:"Ingredients",i:["1 lb ground beef","1 small onion diced","3/4 Cup bread crumbs","1 egg","1/4 Cup ketchup","1/4 Cup milk","1 Tbsp Worcestershire sauce","1 tsp salt","1 tsp garlic powder","1/2 tsp pepper","1/2 tsp dried oregano","1/2 tsp dried basil","Tomato sauce or BBQ sauce for topping"]}],d:["Preheat oven to 350F. Lightly grease a 9x5-inch loaf pan.","Combine all ingredients. Mix with your hands until well combined but do not overmix or the meatloaf will be tough.","Press mixture into the prepared loaf pan.","Spread tomato sauce or BBQ sauce over the top.","Bake 45 minutes to 1 hour or until internal temperature reaches 160F.","Let rest 5 minutes before slicing."]},
"Crockpot Ziti":{y:"8 servings",t:"High crockpot",p:"15 min",c:"2 hrs 15 min",s:[{h:"Ingredients",i:["1 pound uncooked ziti noodles","2 jars (24 oz each) pasta sauce","15 oz ricotta cheese","8 oz mozzarella shredded (divided)","2 eggs","Italian seasoning, oregano, and basil to taste"]}],d:["Mix together ricotta cheese, eggs, and seasonings until well combined.","Grease the inside of your crockpot.","Spread a thin layer of pasta sauce on bottom. Add 1/3 of ziti noodles. Spread half of ricotta. Sprinkle with mozzarella. Repeat layers. End with noodles topped with remaining sauce.","IMPORTANT: Do NOT pre-cook the noodles. They will cook in the sauce.","Cover and cook on HIGH for 2 hours and 15 minutes.","Sprinkle remaining mozzarella on top and let melt 15 minutes with lid on.","Let stand 10 minutes before serving."]},
"Chicken Broccoli and Rice Casserole":{y:"8 servings",t:"350F",p:"20 min",c:"45 min",s:[{h:"Ingredients",i:["2 Cups cream of mushroom or cream of chicken soup (condensed)","1.5 Cups uncooked rice","8 oz sharp cheddar cheese shredded","1 packet onion soup mix","1 lb fresh broccoli florets","1 lb boneless chicken breast cut bite-sized","1 tsp garlic powder","1 tsp black pepper","1.5 tsp salt","2.5 Cups water or chicken broth","Crushed crackers or bread crumbs for topping"]}],d:["Preheat oven to 350F. Grease a 9x13-inch casserole dish.","Combine cream soup, uncooked rice, half of the shredded cheese, onion soup mix, garlic powder, pepper, and salt. Mix well.","Add water or chicken broth and stir to combine.","Add raw chicken pieces and broccoli florets. Mix everything together.","Pour into prepared casserole dish. Cover tightly with aluminum foil.","Bake 45 minutes or until rice is tender and chicken is cooked through (165F).","Remove foil, sprinkle with remaining cheese and crushed crackers. Return to oven 5-10 minutes until golden.","Let stand 5 minutes before serving."]},
"Hearty Split Pea Soup":{y:"8 servings",t:"Stovetop",p:"15 min",c:"1-1.5 hrs",s:[{h:"Ingredients",i:["1 package (16 oz) dried split peas","7 Cups water","1 large potato peeled and cubed","2 medium carrots peeled and chopped","1 ham bone (or 1-2 cups diced ham)","3 tsp chicken bouillon (or 3 cubes)","1/2 tsp black pepper","1.5 tsp dried basil","1 tsp salt","1/2 Tbsp garlic powder","1 tsp onion powder"]}],d:["In a large Dutch oven combine all ingredients.","Bring to a boil over high heat stirring occasionally.","Reduce heat to low. Cover and simmer 1 hour 15 min to 1 hour 30 min, stirring occasionally.","Soup is done when peas have broken down and vegetables are very tender.","Remove ham bone. Pick off any meat and return to soup. Discard bone.","Taste and adjust seasonings. If too thick add more water. If too thin simmer uncovered 10-15 minutes.","Serve hot with crusty bread."]},
"Seven Can Soup":{y:"6-8 servings",t:"Stovetop",p:"5 min",c:"15 min",n:"Tuesday boys-cook night -- boys handle this completely independently",s:[{h:"Ingredients",i:["1 Can All Meat Chili","1 Can Diced Tomatoes","1 Can Kidney Beans","1 Can Corn","1 Can Navy Beans","1 Can Black Beans","1 Can Small Red Beans","1 tsp Salt","Fresh Ground Black Pepper","1/2 Block Sharp Cheese shredded"]}],d:["Open all cans and dump into pot.","Heat until simmering.","Add shredded cheese, salt and pepper.","Serve hot."]},
"Ham and Cheese Ziti":{y:"6 servings",t:"350F",p:"20 min",c:"20-25 min",s:[{h:"Ingredients",i:["2.5 cups (9 oz) uncooked ziti pasta","1/4 cup butter","1 garlic clove minced","1/4 cup all-purpose flour","1/2 tsp salt","2 cups milk","1/2 tsp Dijon mustard","2 cups (8 oz) shredded Colby cheese","4 oz deli ham cut into thin strips","1/3 cup grated Parmesan cheese"]}],d:["Preheat oven to 350F.","Cook ziti pasta according to package directions. Drain well and set aside.","Melt butter over low heat. Add minced garlic and cook 30 seconds.","Stir in flour and salt. Cook over medium heat stirring constantly until smooth and bubbly (about 1 minute).","Gradually add milk, whisking constantly. Bring to a boil still stirring. Boil 1 minute.","Reduce heat. Stir in Dijon mustard and Colby cheese until melted.","Add cooked pasta and ham to cheese sauce. Stir well.","Pour into an ungreased 2-quart casserole dish. Sprinkle Parmesan over top.","Bake uncovered 20-25 minutes until hot and bubbly.","Let stand 5 minutes before serving."]},
"Slow Cooker Ravioli Lasagna":{y:"8 servings",t:"Low crockpot",p:"15 min",c:"4 hrs",n:"Dawn sets it before school -- dinner makes itself",s:[{h:"Ingredients",i:["1 pound ground beef","1 Tbsp chopped garlic","1 tsp garlic powder","1 tsp salt","1/2 tsp black pepper","2 jars (24.5 oz) prepared pasta sauce","1 tsp Italian seasoning","1 tsp dried basil","1 tsp dried oregano","1 package (25 oz) frozen cheese ravioli","2 Cups shredded mozzarella cheese"]}],d:["Cook and stir beef, garlic, garlic powder, salt, and pepper until browned 5-7 minutes. Drain. Stir in pasta sauce and herbs.","Ladle a generous layer of meat sauce into the bottom of a slow cooker. Add a layer of ravioli. Alternate with remaining ravioli and meat sauce.","Cook on Low 3 to 5 hours. Sprinkle with mozzarella cheese and continue cooking until cheese is melted, 45 minutes to 1 hour more."]},
"Grandma's Potato Salad":{tier:"grandma",prov:"Grandma Stewart's potato salad -- handed down, reconstructed from memory and taste by John.",y:"8-10 servings",t:"Stovetop",p:"20 min + chill",c:"20 min",n:"Warm weather staple -- especially good with grilled food",s:[{h:"Ingredients",i:["3-5 lbs potatoes","1/3 Cup cider vinegar","1.25 Cups Hellman's mayonnaise","1.25 tsp salt","1 small to medium onion diced","Fresh black pepper to taste"]}],d:["Peel potatoes and cut into approximately 1-inch cubes, keeping pieces uniform.","Place potato cubes in a large pot and cover with cold water. Bring to a boil.","Boil until potatoes are tender when pierced with a fork but NOT mushy, about 15-20 minutes.","Drain potatoes immediately. Do NOT let them sit in water -- they will become waterlogged.","While potatoes are still warm, whisk together mayonnaise, vinegar, salt, and diced onion.","Add warm drained potatoes to the dressing.","Gently fold potatoes into dressing. Be careful not to overmix -- coat evenly while keeping them intact.","Grind fresh black pepper over top to taste.","Cover and refrigerate until completely cool. Flavors develop as it chills."]},
"Crazy Bread":{y:"14-16 sticks",t:"450F",p:"30 min",c:"6-8 min",s:[{h:"Dough",i:["1 Cup warm water (about 110F)","1 package (2.25 tsp) instant yeast","2 tsp sugar","2.25 cups all-purpose flour","1 tsp salt"]},{h:"Garlic Butter",i:["2-3 Tbsp real butter","1/2 to 1 tsp garlic salt","Grated Parmesan cheese for topping"]}],d:["Combine warm water, yeast, and sugar. Let stand 10 minutes until foamy. If it does not foam, start over with fresh yeast.","Add flour and salt. Mix well then knead 4-5 minutes until smooth and elastic.","Cover bowl and let dough rest 10-15 minutes.","Grease a pizza pan. Press and stretch dough to fit.","Using a pizza cutter make 7-8 cuts lengthwise then one cut across the middle.","Cover with a kitchen towel and let rise 10-20 minutes.","Preheat oven to 450F.","Melt 2-3 Tbsp real butter. Add garlic salt to taste.","Bake 6-8 minutes until golden brown. Watch carefully.","Remove from oven and immediately brush both top and bottom with garlic butter.","Lightly sprinkle Parmesan over top. Serve warm."]},
"Olive Garden Breadsticks":{y:"12-14 breadsticks",t:"400F",p:"20 min + rise",c:"12-14 min",s:[{h:"Dough",i:["1.5 Cups warm water","1 package active dry yeast","4.25 Cups all-purpose flour","2 Tbsp unsalted butter melted","2 Tbsp sugar","1 Tbsp salt"]},{h:"Topping",i:["1 stick unsalted butter","2 tsp garlic powder","2 tsp salt"]}],d:["Dissolve sugar and yeast in warm water. Sit 10 minutes covered. Mixture should be frothy.","Combine flour and salt. Add yeast mixture then melted butter. Mix until fully combined.","Knead until smooth -- do not overknead. Roll out into strips on greased baking sheet.","Cover dough and let sit in a warm place 45 minutes to an hour.","Bake at 400F for 12-14 minutes.","After 6-7 minutes of baking brush breadsticks with half of butter topping.","Right after removing from oven brush tops with remaining butter topping. Let cool a minute then eat."]},
"Chinese Sweet and Sour Chicken":{y:"5-6 servings",t:"375F oil",p:"30 min",c:"20 min",s:[{h:"Chicken",i:["2 lbs boneless chicken breast (1-inch cubes)"]},{h:"Batter",i:["1 Cup flour","1/2 Cup cornstarch","2 tsp salt","1 tsp baking powder","1 Cup water","2 Tbsp oil"]},{h:"Sauce",i:["1/2 Cup brown sugar","4 Tbsp cornstarch","1 can (20 oz) pineapple chunks plus syrup","1/2 Cup vinegar","2 Tbsp ketchup","2 Cups pineapple syrup (add water if needed)","1 green pepper (1-inch pieces)","1 onion (1-inch pieces)"]}],d:["Sauce: Combine sugar, 4 Tbsp cornstarch, pineapple syrup, vinegar, ketchup. Cook over medium stirring until thick. Add pineapple chunks. Set aside.","Batter: Whisk flour, cornstarch, salt, baking powder, water, oil.","Heat oil to 375F. Pat chicken dry. Dip in batter, fry in batches 5-7 min until golden. Drain, keep warm.","Reheat sauce, add pepper and onion. Cook 3-4 min until crisp-tender. Add chicken and toss. Serve over rice."]},
"General Tso's Chicken":{y:"5-6 servings",t:"350-400F oil",p:"20 min",c:"30 min",s:[{h:"Chicken",i:["3 lbs chicken breast (bite-sized)"]},{h:"Coating",i:["1/4 Cup soy sauce","1 egg beaten","1 Cup cornstarch"]},{h:"Sauce",i:["1/2 Cup cornstarch","1/4 Cup water","1.5 tsp garlic","3/4 Cup sugar","1/2 Cup soy sauce","1/4 Cup vinegar","1/4 Cup wine","14 oz chicken broth","3/4 tsp pepper","3/4 tsp red pepper flakes","2 Cups green onions (1-inch pieces)","8 dried red chilies seeded"]}],d:["Sauce: Shake all sauce ingredients in a jar. Set aside.","Coating: Mix soy sauce, egg, cornstarch very thick. Add chicken, stir to coat.","Heat oil to 350F. Fry chicken in batches 5-7 min until golden. Keep warm in 200F oven.","Heat 2-3 Tbsp oil to 400F in wok. Add chilies and green onions, stir-fry 30 sec.","Shake sauce jar, pour into wok. Stir until thick. Add chicken, toss quickly. Serve over rice."]},
"Chicken and Broccoli":{y:"4-5 servings",t:"275F then high",p:"30 min + marinate",c:"20 min",s:[{h:"Chicken",i:["3/4-1 lb chicken breast (3/4-inch cubes)"]},{h:"Velvet Marinade",i:["1 egg white","1 Tbsp cornstarch","1/4 tsp salt"]},{h:"Sauce",i:["2 Tbsp oyster sauce","1 Tbsp light soy","1 Tbsp dark soy","1 Tbsp water"]},{h:"Vegetables",i:["1 lb broccoli","2 garlic cloves crushed","1 tsp cornstarch plus 1 Tbsp water","1/2 Cup water, 1/4 tsp salt, 1/2 tsp sugar","2 Cups plus 4 Tbsp oil"]}],d:["Whisk egg white, cornstarch, salt. Add chicken, coat. Refrigerate 30 min.","Mix sauce ingredients. Mix thickener. Cut broccoli into pieces.","Heat 2 Cups oil to 275F. Add chicken, cook 30 sec, separate gently. Remove when white. Drain.","Drain oil. Heat 2 Tbsp oil on high. Add garlic, stir-fry 10 sec. Add broccoli, salt, sugar. Stir-fry 30 sec. Add water, cover, steam 4-5 min until bright green. Remove, drain.","Heat 2 Tbsp oil. Add broccoli and chicken, toss to cook through. Pour sauce in center, add thickener, stir to thicken. Toss together. Serve over rice."]},
"Chinese Pork Fried Rice":{y:"4-5 servings",t:"High heat",p:"10 min",c:"10-15 min",n:"Day-old rice is essential for best results",s:[{h:"Ingredients",i:["2 Cups cooked rice (day-old best)","2 Tbsp oil divided","1 small onion chopped","1 bag frozen peas with carrots","2 oz scallions sliced","2 tsp Garlic Powder","1/4 tsp soy sauce","1 tsp MSG","1/2 tsp salt","1/2 tsp ginger","1/2 tsp pepper","2 eggs scrambled","Char Siu cooked pork diced"]}],d:["Break up day-old rice. Heat wok on high. Add 1/2 Tbsp oil, add half rice, stir-fry 3 min until toasted. Transfer. Repeat with remaining rice.","Add 1/2 Tbsp oil, scramble eggs. Add to rice.","Heat final 1/2 Tbsp oil. Add onion, carrot, white scallions. Stir-fry 2 min.","Return rice and eggs. Add peas, pork, garlic, ginger, MSG, salt, pepper, soy sauce. Toss 2-3 min. Add green scallions, toss 30 sec."]},
"Chinese Char Siu Sauce":{y:"Marinade for 2-3 lbs",t:"Med-low",p:"5 min",c:"5 min",s:[{h:"Ingredients",i:["2 Tbsp light soy sauce","1 Tbsp oyster sauce","1 Tbsp rice wine","3 Tbsp sugar","1 tsp garlic powder","1/4 Cup honey","1/4 tsp salt","1/4 tsp five-spice","2 Tbsp water","1/4 tsp MSG"]}],d:["Combine all in saucepan. Heat over medium-low stirring until sugar dissolves, 3-5 min. Do not boil.","Cool completely. Use as marinade 4+ hours or overnight.","Roast marinated meat at 375F, basting with remaining sauce."]},
"BLT Sandwiches":{y:"6 sandwiches (family)",t:"Stovetop",p:"5 min",c:"15 min",n:"Family BLT night. One sandwich per boy, one and a half for Mom and Dad. Cook the whole pound of bacon.",s:[{h:"Ingredients",i:["1 lb bacon","bread (about 9 slices worth)","lettuce","tomato, sliced","Hellman's mayonnaise"]}],d:["Cook the full pound of bacon until crisp. Drain on paper towels.","Toast the bread if you like.","Spread mayo, layer bacon, lettuce, and tomato.","Make one sandwich per boy and one and a half each for Mom and Dad."]},
"Tacos":{y:"family (1.5 lb beef)",t:"Stovetop",p:"5 min",c:"15 min",n:"Taco night. Brown the beef, season, and set out the toppings.",s:[{h:"Ingredients",i:["1.5 lb ground beef","taco seasoning","sharp cheddar cheese, shredded","lettuce, shredded","tomato, diced","taco shells"]}],d:["Brown the 1.5 lb ground beef, drain.","Add taco seasoning and water per packet, simmer until thick.","Warm the shells.","Set out sharp cheddar, lettuce, and tomato and let everyone build their own."]},
"Sloppy Joes":{y:"family (1 lb beef)",t:"Stovetop",p:"5 min",c:"15 min",n:"Quick Manwich Bold sloppy joes on hamburger buns.",s:[{h:"Ingredients",i:["1 lb ground beef","1 can Manwich Bold","1 pack hamburger buns"]}],d:["Brown the 1 lb ground beef, drain.","Stir in the can of Manwich Bold.","Simmer 5-10 minutes until heated through and thickened.","Serve on hamburger buns."]},
"Sausage Egg and Cheese Muffins":{y:"at least 6 muffins",t:"Cast iron / Stovetop",p:"5 min",c:"20 min",n:"A family favorite for breakfast or dinner. Use ground breakfast sausage, or links/patties broken up, or leftover holiday ham.",s:[{h:"Ingredients",i:["1 lb ground breakfast sausage (or links/patties broken up, or leftover holiday ham)","1 dozen eggs","Cooper Sharp American cheese","English muffins (Thomas' preferred -- toast or bagel in a pinch)"]}],d:["Brown the 1 lb breakfast sausage in a cast iron pan.","Drain the grease and set the sausage aside.","Add the dozen eggs to the pan.","Add the sausage back in and scramble together.","Top with Cooper Sharp American cheese and let it melt.","Use a spatula to cut the eggs into sections and place on a toasted English muffin. Makes at least 6."]},
"Homemade Mac and Cheese":{y:"6 servings",t:"350F",p:"20 min",c:"20-25 min",n:"Our homemade mac and cheese -- same recipe as our Ham and Cheese Ziti, just no ham, made with elbow or rotini noodles.",s:[{h:"Ingredients",i:["2.5 cups (9 oz) uncooked elbow or rotini noodles","1/4 cup butter","1 garlic clove minced","1/4 cup all-purpose flour","1/2 tsp salt","2 cups milk","1/2 tsp Dijon mustard","2 cups (8 oz) shredded Colby cheese","1/3 cup grated Parmesan cheese"]}],d:["Preheat oven to 350F.","Cook the elbow or rotini noodles according to package directions. Drain well and set aside.","Melt butter over low heat. Add minced garlic and cook 30 seconds.","Stir in flour and salt. Cook over medium heat stirring constantly until smooth and bubbly (about 1 minute).","Gradually add milk, whisking constantly. Bring to a boil still stirring. Boil 1 minute.","Reduce heat. Stir in Dijon mustard and Colby cheese until melted.","Add the cooked pasta to the cheese sauce. Stir well.","Pour into an ungreased 2-quart casserole dish. Sprinkle Parmesan over top.","Bake uncovered 20-25 minutes until hot and bubbly.","Let stand 5 minutes before serving."]},
"Grandma's Stuffing":{tier:"grandma",prov:"Grandma Stewart's stuffing -- made from scratch, only with turkey at Thanksgiving and sometimes Christmas. The browned, finely diced turkey liver is the secret seasoning, and the cubed potatoes stretch it the old Depression-era way. Reconstructed by John from memory.",y:"1 turkey's worth",t:"Cast iron + roasted in the turkey",p:"30 min",c:"with the turkey",n:"UNTESTED -- written from John's memory, not yet cooked from these measurements. To be confirmed and fine-tuned at Thanksgiving. Thyme is added by sight to a well-coated look; use thyme leaves, NOT ground.",s:[{h:"Ingredients",i:["1 loaf store-bought white bread, cubed","1 stick butter","Turkey liver (browned, then diced small -- used as seasoning)","2-3 large potatoes, cubed to about 1/2 inch","1 small onion (optional)","3-4 stalks celery, chopped","Salt and pepper to taste","About 2.5-3 Tbsp thyme leaves (roughly 1/3 of a 0.75 oz bottle) -- leaves, not ground; add by sight until well coated"]}],d:["Cube the loaf of white bread and place in a large bowl.","Melt the stick of butter in a cast iron pan.","Add the turkey liver and brown it. Remove and dice it small -- it acts as a seasoning throughout the stuffing.","In the same butter, cook the cubed potatoes and onion.","Add the celery and cook until the vegetables are almost cooked through.","Add the cooked vegetables and diced liver to the bowl with the bread.","Season with salt, pepper, and the thyme leaves -- add the thyme by sight until everything looks well coated (about 2.5-3 Tbsp).","Mix everything together.","Stuff into the turkey and roast. For a first-time cook: stuffing inside the bird should reach 165F in the center to be safe.","Note: this is grandma's traditional method, cooked in the turkey. John has eaten it this way every year for over 40 years."]},

"Stuffed Peppers":{tier:"adapted",prov:"Adapted from the family's Betty Crocker cookbook and cooked the Stewart way -- halved peppers, oiled and salted inside like a salt potato, no cheese.",y:"12 halves (family)",t:"Oven 350F",p:"20 min",c:"40 min",n:"Cut peppers in half and bake -- no parboiling. The oiled-and-salted inside is the family touch.",s:[{h:"Ingredients",i:["6 large bell peppers, cut in half vertically (12 halves)","1.5 lb ground beef","3 Tbsp chopped onion","1.5 cups cooked rice","1.5 tsp salt (for the mix)","1-2 cloves garlic, finely chopped","1 large can (~22 oz) tomato sauce","olive or vegetable oil (for pepper insides)","coarse or table salt (for pepper insides)"]}],d:["Heat oven to 350F.","Cut the peppers in half vertically. Remove seeds and membranes, rinse and dry.","Lightly coat the inside of each pepper half with oil, then coat the inside with coarse or table salt -- like a salt potato, on the inside.","Brown the 1.5 lb ground beef with the onion, drain.","Stir in the cooked rice, 1.5 tsp salt, garlic, and about 1 cup of the tomato sauce. Heat through.","Fill the pepper halves with the beef and rice mix and stand them in a baking dish.","Pour the remaining tomato sauce over the peppers.","Cover tightly with foil and bake 10 minutes. Uncover and bake about 15 minutes more until the peppers are tender. No cheese."]},

"Ham Pot Pie":{tier:"adapted",prov:"A recipe Dawn and John adapted together -- an au gratin base with ham, canned vegetables, and Grandma's pie crust on top.",y:"6-8 servings",t:"Oven 400F",p:"15 min",c:"40-45 min",n:"Different from the chicken and turkey pot pie -- this one is built on au gratin potatoes. Great use of leftover holiday ham.",s:[{h:"Ingredients",i:["2 packages (4.9 oz) au gratin potatoes","3 cups boiling water","2 cans mixed vegetables","1 can corn","1.5 cups cubed fully cooked ham","2 cans (10.75 oz) condensed cream of chicken soup, undiluted","1 cup milk","Grandma's pie crust (top only)"]}],d:["Heat oven to 400F.","In a large bowl, combine the au gratin potatoes, both sauce mix packets, and the boiling water.","Stir in the mixed vegetables, corn, ham, cream of chicken soup, and milk.","Transfer to an ungreased 2-quart (or larger) baking dish.","Roll out Grandma's pie crust to fit the top. Place over the potato mixture, flute the edges, and cut slits in the pastry.","Bake at 400F for 40-45 minutes or until golden brown.","Let stand 5 minutes before serving."]},
"Beans and Weenies":{y:"6 servings",t:"Stovetop",p:"5 min",c:"15 min",n:"Quick boys' favorite. Sliced hot dogs simmered in baked beans.",s:[{h:"Ingredients",i:["hot dogs (sliced)","baked beans","ketchup","brown sugar"]}],d:["Slice the hot dogs into coins.","Brown them lightly in a pan if you like.","Stir in the baked beans, a squirt of ketchup, and a spoon of brown sugar.","Simmer 10-15 minutes until hot and bubbly."]},
"Hot Dogs and Mac and Cheese":{y:"6 servings",t:"Stovetop",p:"5 min",c:"15 min",n:"Boys' favorite combo -- hot dogs with mac and cheese. Slice the dogs into the mac or serve on buns.",s:[{h:"Ingredients",i:["hot dogs","boxed mac and cheese","hot dog buns (optional)"]}],d:["Make the mac and cheese per the box.","Cook the hot dogs (boil, pan, or grill).","Serve the hot dogs on buns or sliced into the mac and cheese."]},
"Turkey Loin":{y:"6 servings",t:"Oven",p:"10 min",c:"50-60 min",n:"Lean turkey loin from Surplus Outlet. Pairs well with mashed potatoes or stuffing and a vegetable.",s:[{h:"Ingredients",i:["1 turkey loin","salt","pepper","oil"]}],d:["Heat oven per the turkey loin package (usually 350-375F).","Rub the loin with a little oil, salt, and pepper.","Roast until the internal temperature reaches 165F (about 50-60 minutes depending on size).","Let rest 5-10 minutes, then slice.","Serve with mashed potatoes or stuffing and a vegetable."]},
"Grandma's Pasta with Bacon":{tier:"grandma",prov:"From the Stewart household when John's dad was growing up -- they made it often. His dad cooked it for the family. A simple Depression-era dish: leftover bacon, a can of tomato soup, and noodles. Grandma never made it for John's family, but it came down through his dad.",y:"about 4 servings",t:"Stovetop",p:"5 min",c:"15 min",n:"Old-fashioned, frugal, and good. Great way to use up leftover bacon. The condensed tomato soup goes in straight from the can -- not thinned.",s:[{h:"Ingredients",i:["10 oz pasta","1 can condensed tomato soup (undiluted)","1/2 lb cooked bacon, broken into pieces"]}],d:["Cook the pasta until done. Drain and return to the pot.","Add the condensed tomato soup (straight from the can, undiluted) and the cooked bacon pieces.","Stir to coat the pasta and bacon with the soup.","Heat thoroughly and serve."]},
"Rollie Pollies":{tier:"grandma",prov:"Grandma Stewart made these from whatever pie crust dough was left over -- nothing wasted. Usually baked right alongside an apple pie. A little bonus treat from the trimmings, and a favorite childhood memory.",y:"varies with leftover dough",t:"Oven (baked with the pie)",p:"10 min",c:"bake until golden brown",n:"Made from leftover Grandma's Pie Crust dough. Cooked alongside the pie, usually apple, at pie temperature (around 375-425F) until golden brown -- watch them, they're thin and bake fast.",s:[{h:"Ingredients",i:["Leftover pie crust dough (see Grandma's Pie Crust)","Butter, softened, for spreading","Cinnamon sugar (about 1/4 cup sugar to 1 Tbsp cinnamon)"]}],d:["Roll out the leftover pie crust dough thin.","Spread softened butter over the rolled-out dough.","Sprinkle cinnamon sugar evenly over the butter.","Cut the dough into rectangles or squares.","Roll each piece up so the cinnamon sugar is on the inside.","Place on a baking sheet and bake alongside the pie (usually apple) at pie temperature, around 375-425F.","Bake until golden brown -- they're thin, so keep an eye on them."]},
"Cracker Barrel Baked Chicken & Broccoli":{y:"4 servings",t:"Oven 350F",p:"15 min",c:"40-45 min",n:"Based on Cracker Barrel. Chicken breasts baked under cheddar sauce and broccoli with a buttery Ritz topping. Pairs well with mashed potatoes or rice.",s:[{h:"Ingredients",i:["4 boneless skinless chicken breasts","1/2 tsp kosher salt","1/2 tsp black pepper","10.5 oz can cheddar cheese soup","1/2 cup whole milk","1 tsp paprika","1.5 cups shredded cheddar cheese (divided)","2 cups frozen broccoli florets, thawed","1 cup crushed Ritz crackers","3 Tbsp unsalted butter, melted"]}],d:["Preheat oven to 350F. Prepare a baking dish with cooking spray.","Season chicken breasts with salt and pepper on both sides. Place in a single layer in the baking dish.","In a bowl, combine cheddar cheese soup, milk, and paprika. Stir until smooth.","Distribute thawed broccoli over the chicken. Sprinkle 1 cup shredded cheddar over the broccoli.","Pour the cheese sauce evenly over the chicken and broccoli.","In a separate bowl, mix crushed Ritz, melted butter, and remaining 1/2 cup cheddar. Sprinkle over the top.","Bake 40-45 minutes until chicken is cooked through and topping is golden brown.","Cool a few minutes before serving. Pairs well with mashed potatoes or rice."]},

let activeCat = 'all';

function setCat(cat, btn){
  activeCat = cat;
  document.querySelectorAll('.fc').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterMeals();
}

function filterMeals(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = MEALS.filter(m=>{
    const catMatch = activeCat==='all' || m.cat===activeCat;
    const searchMatch = !q || m.name.toLowerCase().includes(q) || (m.ingredients||[]).some(i=>i.toLowerCase().includes(q));
    return catMatch && searchMatch;
  });
  renderMeals(filtered);
}

function esc(s){ return (s||'').toString().replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

function renderMeals(list){
  const el = document.getElementById('meals-list');
  if(!list.length){ el.innerHTML = '<div class="empty">No recipes match. Try a different search.</div>'; return; }
  el.innerHTML = list.map(m=>{
    const bdId = 'gbd-'+m.id;
    return `<div class="meal-card">
      <div class="meal-hd" onclick="toggleMeal('${bdId}')">
        <div>
          <div class="meal-name">${esc(m.name)}</div>
          <div class="meal-meta">${esc(m.cat)} · ${esc(m.method)} · ${m.cookTime} min · serves ${m.serves}</div>
        </div>
        <span class="meal-chev" id="chev-${bdId}">▾</span>
      </div>
      <div class="meal-bd" id="${bdId}">
        ${buildBoysRecipeCard(m)}
      </div>
    </div>`;
  }).join('');
}

function toggleMeal(bdId){
  const bd = document.getElementById(bdId);
  const chev = document.getElementById('chev-'+bdId);
  if(!bd) return;
  const isOpen = bd.classList.toggle('open');
  if(chev) chev.textContent = isOpen ? '▴' : '▾';
}

function buildBoysRecipeCard(m){
  const r = m.cbKey ? CB[m.cbKey] : null;
  const ingredientList = `<div class="sec-title">Ingredients</div><ul>${(m.ingredients||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`;
  const metaRow = `<div class="meta-row">
    ${m.cal?`<span>${m.cal} cal</span>`:''}
    ${m.pro?`<span>${m.pro}g protein</span>`:''}
    ${m.sides?`<span>Sides: ${esc(m.sides)}</span>`:''}
  </div>`;

  if(!r){
    return metaRow + ingredientList + '<div class="no-recipe">Simple prep — no step-by-step needed. Ask Dad or Mom if you want tips.</div>';
  }

  const sections = (r.s||[]).map(sec=>`<div class="sec-title">${esc(sec.h)}</div><ul>${(sec.i||[]).map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`).join('');
  const steps = (r.d||[]).map((s,i)=>`<div class="step"><div class="step-num">${i+1}</div><div>${esc(s)}</div></div>`).join('');
  const recipeMeta = [
    r.y?`Yield: ${esc(r.y)}`:'', r.t&&r.t!=='N/A'?`Temp: ${esc(r.t)}`:'',
    r.p?`Prep: ${esc(r.p)}`:'', r.c&&r.c!=='N/A'?`Cook: ${esc(r.c)}`:''
  ].filter(Boolean).join(' · ');

  return metaRow
    + (sections || ingredientList)
    + `<div class="sec-title">Directions</div><div class="steps">${steps}</div>`
    + (recipeMeta ? `<div class="meal-meta" style="margin-top:8px;">${recipeMeta}</div>` : '')
    + (r.n ? `<div class="no-recipe">★ ${esc(r.n)}</div>` : '');
}

renderMeals(MEALS);
</script>

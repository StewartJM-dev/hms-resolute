<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Systems Seven · Crow's Nest</title>
<link rel="apple-touch-icon" href="../assets/crest.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crow's Nest">
<link rel="icon" type="image/png" href="../assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --navy:#0b1d33;--brass:#b08d3e;--brass2:#d4af5a;
  --steel:#5d6b7a;--steel2:#8494a5;--signal:#f2efe6;--ink:#101820;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Crimson Pro',Georgia,serif;
  background:radial-gradient(ellipse at 50% -10%,rgba(212,175,90,.08),transparent 55%),
    linear-gradient(170deg,var(--navy) 0%,#081426 60%,#060f1d 100%);
  color:var(--signal); min-height:100vh; padding-bottom:60px;
}
.back{ position:fixed; top:16px; left:14px; color:var(--brass2); text-decoration:none; font-family:'Lato',sans-serif; font-size:12px;}
header{ text-align:center; padding:34px 16px 8px; }
.cn-banner{ width:100%; max-height:190px; overflow:hidden; }
.cn-banner img{ width:100%; height:100%; object-fit:cover; object-position:center 45%; display:block; }
.hcrest{ width:56px; height:56px; border-radius:50%; box-shadow:0 3px 12px rgba(0,0,0,.5),0 0 0 2px rgba(212,175,90,.4); margin-bottom:10px;}
.pennant{ font-family:'Lato',sans-serif;font-size:10px;letter-spacing:.35em;text-transform:uppercase;color:var(--brass2);}
h1{ font-family:'Cinzel',serif;font-weight:900;font-size:clamp(26px,7vw,38px);letter-spacing:.08em; margin-top:4px;}
.verse{ font-style:italic; color:var(--steel2); font-size:13.5px; max-width:480px; margin:10px auto 0; line-height:1.5; padding:0 12px;}
main{ max-width:560px; margin:22px auto 0; padding:0 14px;}
.card{ background:linear-gradient(180deg,rgba(18,41,74,.8),rgba(11,29,51,.9));
  border:1px solid rgba(212,175,90,.3); border-radius:10px; padding:16px; margin-bottom:14px;}
textarea{ width:100%; min-height:80px; padding:12px; border-radius:6px; font-size:16px; resize:vertical;
  background:rgba(0,0,0,.3); color:var(--signal); border:1px solid rgba(132,148,165,.35); font-family:'Crimson Pro',serif;}
textarea:focus{ outline:none; border-color:var(--brass);}
label{ display:block; font-family:'Lato',sans-serif; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--steel2); margin:4px 0 6px;}
select{ width:100%; padding:11px; border-radius:6px; background:rgba(0,0,0,.3); color:var(--signal); border:1px solid rgba(132,148,165,.35); font-size:15px; margin-bottom:10px;}
.btn{ margin-top:10px; padding:12px 18px; border:none; border-radius:6px; cursor:pointer;
  font-family:'Cinzel',serif; font-size:13.5px; letter-spacing:.1em;
  background:linear-gradient(180deg,var(--brass2),var(--brass)); color:var(--ink); width:100%;}
.entry{ border-left:3px solid var(--brass); background:rgba(0,0,0,.22);
  border-radius:0 8px 8px 0; padding:12px 14px; margin-bottom:10px;}
.entry .who{ font-family:'Lato',sans-serif; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--brass2);}
.entry .txt{ font-size:15.5px; line-height:1.5; margin-top:4px;}
.entry .when{ font-size:11.5px; color:var(--steel); margin-top:6px; font-style:italic;}
.empty{ text-align:center; color:var(--steel); font-style:italic; padding:26px 10px;}
</style>
</head>
<body>

<div class="cn-banner"><img src="assets/crowsnest-interior.jpg" alt="" loading="eager"></div>
<a class="back" href="../">← Gangway</a>
<header>
  <img class="hcrest" src="../assets/crest.png" alt="HMS Resolute crest">
  <div class="pennant">The Watch Above · HMS Resolute</div>
  <h1>CROW'S NEST</h1>
  <div class="verse">"I will stand upon my watch… and will watch to see what he will say unto me." — Habakkuk 2:1</div>
</header>

<main>
  <div class="card">
    <label>Who's logging this</label>
    <select id="who">
      <option value="john">John</option>
      <option value="dawn">Dawn</option>
      <option value="samuel">Samuel</option>
      <option value="johnjr">John Jr.</option>
      <option value="stephen">Stephen</option>
      <option value="daniel">Daniel</option>
    </select>
    <label>What did you see?</label>
    <textarea id="txt" maxlength="500" placeholder="A moment, however small, where God's hand was at work…"></textarea>
    <button class="btn" onclick="logSighting()">🔭 Log the Sighting</button>
  </div>
  <div id="list"><div class="empty">The nest is quiet. Keep watch.</div></div>
</main>

<script>
const FB_CONFIG = {
  apiKey: "AIzaSyAXfFW3rWpChcTDqCiFKwk9QIJMY0fhnfw",
  authDomain: "stewart-family-3cece.firebaseapp.com",
  databaseURL: "https://stewart-family-3cece-default-rtdb.firebaseio.com",
  projectId: "stewart-family-3cece",
  storageBucket: "stewart-family-3cece.firebasestorage.app",
  messagingSenderId: "43602660041",
  appId: "1:43602660041:web:0f3d567cc00e7fdf86db18"
};
firebase.initializeApp(FB_CONFIG);
const db = firebase.database();
const NAMES = {john:'John',dawn:'Dawn',samuel:'Samuel',johnjr:'John Jr.',stephen:'Stephen',daniel:'Daniel'};

function esc(s){ return (s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }
function fmt(t){ return new Date(t).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' · '+new Date(t).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }

async function logSighting(){
  const who = document.getElementById('who').value;
  const txt = document.getElementById('txt').value.trim();
  if(!txt) return;
  await db.ref('resolute/crowsnest').push({who, txt, t: firebase.database.ServerValue.TIMESTAMP});
  document.getElementById('txt').value='';
}

db.ref('resolute/crowsnest').limitToLast(100).on('value', snap=>{
  const v = snap.val()||{};
  const items = Object.values(v).sort((a,b)=>(b.t||0)-(a.t||0));
  document.getElementById('list').innerHTML = items.length ? items.map(e=>`
    <div class="entry">
      <div class="who">${NAMES[e.who]||esc(e.who)}</div>
      <div class="txt">${esc(e.txt)}</div>
      <div class="when">${e.t?fmt(e.t):''}</div>
    </div>`).join('') : '<div class="empty">The nest is quiet. Keep watch.</div>';
});
</script>
</body>
</html>
